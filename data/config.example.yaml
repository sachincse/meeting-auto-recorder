# ============================================
# Meeting Auto-Recorder — Configuration
# ============================================
# Copy this file to config.yaml and fill in your values:
#   cp data/config.example.yaml data/config.yaml
#
# NEVER commit config.yaml — it contains email credentials.
# Changes are picked up on next scan cycle or via tray > Reload Config.

# --- Email Accounts ---
# Add one or more IMAP accounts to monitor for meeting invites.
# For Gmail: use App Passwords (https://myaccount.google.com/apppasswords)
email_accounts:
  - name: "Personal Gmail"
    imap_host: "imap.gmail.com"
    imap_port: 993
    imap_user: "you@gmail.com"
    imap_pass: "xxxx xxxx xxxx xxxx"    # Gmail App Password
    imap_folder: "INBOX"
    enabled: true

  # - name: "Work Email"
  #   imap_host: "outlook.office365.com"
  #   imap_port: 993
  #   imap_user: "you@company.com"
  #   imap_pass: "your-app-password"
  #   imap_folder: "INBOX"
  #   enabled: true

# --- Recording ---
recording:
  output_dir: "C:/Users/YourName/Documents/MeetingRecordings"
  record_mic: true            # Record microphone (your voice)
  record_speaker: true        # Record system/speaker audio (other participants)
  record_screen: true         # Record screen capture
  video_fps: 10               # Screen recording frame rate
  auto_open_meeting: true     # Open meeting URL in browser when recording starts

# --- Scheduler ---
scheduler:
  timezone: "Asia/Kolkata"         # Your timezone
  scan_cron: "*/15 * * * *"       # How often to scan emails (every 15 min)
  pre_meeting_buffer_min: 1        # Start recording N minutes before meeting
  default_duration_min: 90         # Default duration if no end time in invite
  max_emails_to_scan: 100          # How many recent emails to scan per account

# --- System Tray & Hotkeys ---
tray:
  hotkey_toggle_dashboard: "ctrl+shift+m"    # Show/hide status dashboard
  hotkey_stop_recording: "ctrl+shift+s"      # Emergency stop current recording
  show_notifications: true                    # Show Windows toast notifications
