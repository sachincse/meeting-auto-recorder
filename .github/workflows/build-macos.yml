name: Build macOS Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: brew install portaudio

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
          pip install git+https://github.com/sachincse/record-meeting.git

      - name: Build .app with PyInstaller
        run: pyinstaller build_installer_macos.spec

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "InterviewSaarthiRecorder" \
            -srcfolder dist/InterviewSaarthiRecorder.app \
            -ov \
            -format UDZO \
            dist/InterviewSaarthiRecorder.dmg

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: InterviewSaarthiRecorder-macOS
          path: dist/InterviewSaarthiRecorder.dmg

      - name: Upload DMG to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/InterviewSaarthiRecorder.dmg
